android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Keep Gradle stable on Windows/Android Studio during Compose + Room/KSP builds.
# The previous build could crash with:
# "The daemon has terminated unexpectedly ... Kotlin compile daemon is ready".
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Avoid starting a separate Kotlin compile daemon. This is slower, but much more
# reliable for this MVP project and prevents the daemon-startup crash above.
kotlin.compiler.execution.strategy=in-process

# Make KSP/Room less sensitive to stale incremental compiler caches after schema changes.
kotlin.incremental=false
ksp.incremental=false
